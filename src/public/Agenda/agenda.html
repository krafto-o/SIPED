<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestión Clínica - Agenda</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
            --border: #e0e0e0;
            --success: #27ae60;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }

        /* Contenedor Principal */
        .main-card {
            max-width: 1200px;
            margin: auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            padding: 20px;
            background: var(--primary);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Grid de la Agenda */
        .schedule-grid {
            display: grid;
            grid-template-columns: 80px repeat(7, 1fr);
            border-top: 1px solid var(--border);
        }

        .cell {
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            min-height: 60px;
            padding: 5px;
            position: relative;
        }

        .header-cell {
            background: #f8f9fa;
            font-weight: bold;
            text-align: center;
            padding: 15px 0;
            font-size: 0.85em;
        }

        .time-cell {
            background: #fdfdfd;
            font-size: 0.75em;
            color: #7f8c8d;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        /* Bloque de Actividad */
        .appointment-block {
            width: 100%;
            height: 100%;
            background: rgba(52, 152, 219, 0.1);
            border-left: 4px solid var(--accent);
            cursor: pointer;
            font-size: 0.75em;
            padding: 4px;
            box-sizing: border-box;
            transition: 0.2s;
        }

        .appointment-block:hover { background: rgba(52, 152, 219, 0.2); }

        /* Ventana Modal (El Formulario) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none; /* Oculto por defecto */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 500px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .form-group label { font-size: 0.8em; font-weight: bold; margin-bottom: 5px; }
        .form-group input, .form-group textarea { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }

        .btn-group { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
        .btn-confirm { background: var(--success); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }

    </style>
</head>
<body>

<div class="main-card">
    <div class="header">
        <h2 style="margin:0">📅 Agenda Clínica Pedriátrica</h2>
        <span>Abril 2026</span>
    </div>

    <div class="schedule-grid" id="grid">
        </div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal-content">
        <h3>Nueva Cita / Actividad</h3>
        <div class="form-group">
            <label>Nombre del Paciente</label>
            <input type="text" id="p_nombre" placeholder="Nombre completo">
        </div>
        <div class="form-group">
            <label>Motivo / Actividad</label>
            <textarea id="p_motivo" rows="2"></textarea>
        </div>
        <div class="form-group">
            <label>Nombre del Tutor</label>
            <input type="text" id="p_tutor">
        </div>
        <div class="btn-group">
            <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
            <button class="btn-confirm" onclick="saveAppointment()">Agendar</button>
        </div>
    </div>
</div>

<script>
    const grid = document.getElementById('grid');
    const days = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
    let selectedCell = null;

    // 1. Crear encabezados
    grid.innerHTML += `<div class="cell header-cell">Hora</div>`;
    days.forEach(d => grid.innerHTML += `<div class="cell header-cell">${d}</div>`);

    // 2. Generar filas de 8:00 a 16:00
    for(let h=8; h<=16; h++) {
        grid.innerHTML += `<div class="cell time-cell">${h}:00</div>`;
        for(let d=0; d<7; d++) {
            grid.innerHTML += `
                <div class="cell" onclick="openModal(this)">
                    <div class="appointment-block" id="cell-${h}-${d}">Libre</div>
                </div>`;
        }
    }

    function openModal(cell) {
        selectedCell = cell.querySelector('.appointment-block');
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    function saveAppointment() {
        const nombre = document.getElementById('p_nombre').value;
        const motivo = document.getElementById('p_motivo').value;

        if(nombre) {
            selectedCell.innerHTML = `<strong>${nombre}</strong><br>${motivo}`;
            selectedCell.style.background = "rgba(46, 204, 113, 0.2)";
            selectedCell.style.borderLeftColor = "#27ae60";
        }
        
        closeModal();
        // Limpiar campos
        document.getElementById('p_nombre').value = "";
        document.getElementById('p_motivo').value = "";
    }
</script>

</body>
</html>
